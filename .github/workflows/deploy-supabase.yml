name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.scripts/deploy_supabase.sh'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      CI_BASE_SHA: ${{ github.event.before }}
      CI_HEAD_SHA: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "SUPABASE_ACCESS_TOKEN is required." >&2
            exit 1
          fi
          if [[ -z "${SUPABASE_PROJECT_REF:-}" ]]; then
            echo "SUPABASE_PROJECT_REF is required." >&2
            exit 1
          fi

      - name: Mask Supabase token
        run: echo "::add-mask::${SUPABASE_ACCESS_TOKEN}"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Supabase auth/functions
        run: bash .scripts/deploy_supabase.sh
