name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - 'supabase/auth/**'
      - '.scripts/deploy_supabase.sh'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      CI_BASE_SHA: ${{ github.event.before }}
      CI_HEAD_SHA: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate on required secrets
        id: gate
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "Supabase deploy skipped: SUPABASE_ACCESS_TOKEN ontbreekt."
            echo "run_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -z "${SUPABASE_PROJECT_REF:-}" ]]; then
            echo "Supabase deploy skipped: SUPABASE_PROJECT_REF ontbreekt."
            echo "run_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Mask Supabase token
        if: steps.gate.outputs.run_deploy == 'true'
        run: echo "::add-mask::${SUPABASE_ACCESS_TOKEN}"

      - uses: supabase/setup-cli@v1
        if: steps.gate.outputs.run_deploy == 'true'
        with:
          version: latest

      - name: Deploy Supabase auth/functions
        if: steps.gate.outputs.run_deploy == 'true'
        run: bash .scripts/deploy_supabase.sh

      - name: No-op when secrets are missing
        if: steps.gate.outputs.run_deploy != 'true'
        run: echo "Supabase deploy intentionally skipped."
