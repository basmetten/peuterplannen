name: Staging Deployment

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: v2

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bundle blog posts
        run: npm run prebuild

      - name: Build Next.js app
        run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Ensure DNS record exists for staging.peuterplannen.nl
        working-directory: .
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        run: |
          set -euo pipefail
          ZONE_ID=$(curl -sS -f "https://api.cloudflare.com/client/v4/zones?name=peuterplannen.nl" \
            -H "X-Auth-Email: $CLOUDFLARE_EMAIL" \
            -H "X-Auth-Key: $CLOUDFLARE_API_KEY" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['result'][0]['id'])")
          count=$(curl -s "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=staging.peuterplannen.nl" \
            -H "X-Auth-Email: $CLOUDFLARE_EMAIL" \
            -H "X-Auth-Key: $CLOUDFLARE_API_KEY" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['result_info']['count'])")
          if [ "$count" = "0" ]; then
            curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -H "X-Auth-Email: $CLOUDFLARE_EMAIL" \
              -H "X-Auth-Key: $CLOUDFLARE_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"type":"CNAME","name":"staging","content":"peuterplannen.nl","ttl":1,"proxied":true}'
            echo "DNS record aangemaakt voor staging.peuterplannen.nl"
          else
            echo "DNS record bestaat al — skip."
          fi

      - name: Deploy to Cloudflare Worker (staging)
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Smoke test staging
        run: |
          sleep 15
          status=$(curl -sSL -o /dev/null -w "%{http_code}" "https://staging.peuterplannen.nl/")
          echo "Smoke test: HTTP $status"
          [[ "$status" == "200" ]] || exit 1
